<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Idiots | Collage</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/svg+xml" href="/media/favicon.svg">

<style>
body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  background: #111;
  color: #f5f5f5;
  line-height: 1.6;
}

header {
  padding: 3rem 1.5rem 3rem 6.5rem;
  text-align: center;
  border-bottom: 1px solid #222;
  position: relative;
}

.logo {
  position: absolute;
  left: 1.5rem;
  top: 1.5rem;
  width: 256px;
  border-radius: 6px;
}

header h1 {
  margin: 0;
  font-size: 2.5rem;
}

header p {
  margin-top: 0.5rem;
  color: #aaa;
}

.nav-buttons {
  margin-top: 1.5rem;
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.nav-btn {
  padding: 0.6rem 1.4rem;
  border: 1px solid #f5f5f5;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-radius: 6px;
  color: #f5f5f5;
  text-decoration: none;
  font-size: 0.95rem;
  transition: all 0.2s ease;
}

.nav-btn:hover {
  background: #f5f5f5;
  color: #111;
}

/* MAIN CONTENT */

main {
  max-width: 1200px;
  margin: 3rem auto;
  padding: 0 1.5rem;
}

/* COLLAGE GRID */

.collage {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  grid-auto-rows: 200px;
  gap: 1rem;
}

/* IMAGES */

.collage img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid #222;
  transition: transform 0.25s ease, border-color 0.25s ease;
}

.collage img:hover {
  transform: scale(1.03);
  border-color: #4da3ff;
}

/* FEATURED SIZES */

.tall {
  grid-row: span 2;
}

.wide {
  grid-column: span 2;
}

.big {
  grid-column: span 2;
  grid-row: span 2;
}

/* FOOTER */

footer {
  text-align: center;
  padding: 2rem 1.5rem;
  border-top: 1px solid #222;
  color: #777;
  font-size: 0.9rem;
  margin-top: 3rem;
}

/* MOBILE */

@media (max-width: 700px) {

header {
  padding: 2rem 1.5rem;
}

.logo {
  position: static;
  width: 160px;
  margin: 0 auto 1rem auto;
  display: block;
}

.collage {
  grid-auto-rows: 150px;
}

}
</style>
</head>

<body>

<header>
<a href="/">
<img class="logo" src="/media/Modern-logo2.png">
</a>

<h1>Photo Collage</h1>
<p>The most important moments</p>

<div class="nav-buttons">
<a href="/" class="nav-btn">Home</a>
<a href="/publications/index.html" class="nav-btn">Articles</a>
<a href="/idiots/nuh-uh.html" class="nav-btn">Nuh-Uh</a>
</div>
</header>

<main>

<div class="collage">

<img src="/media/photo1.jpg" class="big">
<img src="/media/photo2.jpg">
<img src="/media/photo3.jpg" class="tall">
<img src="/media/photo4.jpg">
<img src="/media/photo5.jpg" class="wide">
<img src="/media/photo6.jpg">
<img src="/media/photo7.jpg">
<img src="/media/photo8.jpg" class="tall">

</div>

</main>

<footer>
© 2026 modernidiots.org
</footer>

</body>
</html>
